# fly.toml app configuration file generated for antcrew-int on 2026-07-21T22:51:17+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'antcrew-int'
primary_region = 'ams'

[build]
  dockerfile = "Dockerfile"
  [build.args]
    APP_ENV = "int"

[env]
  APP_ENV = "int"
  HOST = "0.0.0.0"
  ANTCREW_SANDBOX = "required"
  ANTCREW_REQUIRE_AUTH = "true"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
