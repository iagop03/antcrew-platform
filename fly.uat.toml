# fly.toml app configuration file for antcrew-uat

app = 'antcrew-uat'
primary_region = 'ams'

[build]
  dockerfile = "Dockerfile"
  [build.args]
    APP_ENV = "uat"

[env]
  APP_ENV = "uat"
  HOST = "0.0.0.0"
  ANTCREW_SANDBOX = "required"
  ANTCREW_REQUIRE_AUTH = "true"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
