name: Deploy

on:
  # Automatic: push to main deploys to dev
  push:
    branches: [main]

  # Manual: choose target environment
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [int, uat, prod]

jobs:
  # ── Step 1: run tests before any deploy ────────────────────────────────────
  test:
    name: Test (Python 3.11)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: antcrew_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        env:
          TEST_DB_URL: postgresql+asyncpg://postgres:postgres@localhost/antcrew_ci
          LOG_FORMAT: text
          ANTCREW_SANDBOX: none
        run: pytest -v --tb=short

  # ── Step 2: build and push image to GHCR ───────────────────────────────────
  build:
    name: Build image (${{ (github.event_name == 'push' && 'dev') || github.event.inputs.environment }})
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      env_name: ${{ steps.resolve-env.outputs.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve target environment
        id: resolve-env
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "name=dev" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=${{ steps.resolve-env.outputs.name }}-,format=short
            type=raw,value=${{ steps.resolve-env.outputs.name }}-latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            APP_ENV=${{ steps.resolve-env.outputs.name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Step 3: deploy ─────────────────────────────────────────────────────────
  # The "prod" GitHub Environment requires a manual approval — configure this
  # under Settings → Environments → prod → Required reviewers.
  deploy:
    name: Deploy to ${{ needs.build.outputs.env_name }}
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ needs.build.outputs.env_name }}

    steps:
      - name: Log deploy target
        run: |
          echo "Deploying image: ${{ needs.build.outputs.image }}"
          echo "Target env:      ${{ needs.build.outputs.env_name }}"

      # ── Add your platform-specific deploy command below ───────────────────
      #
      # Option A — SSH (VPS / bare metal):
      #   Secrets needed: DEPLOY_HOST, DEPLOY_USER, DEPLOY_KEY (per-environment)
      #
      # - name: Deploy via SSH
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.DEPLOY_HOST }}
      #     username: ${{ secrets.DEPLOY_USER }}
      #     key: ${{ secrets.DEPLOY_KEY }}
      #     script: |
      #       cd /opt/antcrew-platform
      #       echo "${{ secrets.GITHUB_TOKEN }}" | \
      #         docker login ghcr.io -u ${{ github.actor }} --password-stdin
      #       docker compose -f docker-compose.yml \
      #         -f docker-compose.${{ needs.build.outputs.env_name }}.yml \
      #         pull platform
      #       docker compose -f docker-compose.yml \
      #         -f docker-compose.${{ needs.build.outputs.env_name }}.yml \
      #         up -d --remove-orphans
      #
      # Option B — Fly.io:
      #   Secrets needed: FLY_API_TOKEN (per-environment)
      #
      # - uses: superfly/flyctl-actions/setup-flyctl@master
      # - run: flyctl deploy --image ${{ needs.build.outputs.image }}
      #   env:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      #     FLY_APP: antcrew-${{ needs.build.outputs.env_name }}
      #
      # Option C — Render / Railway / other PaaS:
      #   Trigger their deploy hook with the new image tag.
      #
      - name: Deploy (no command configured — see comments above)
        run: |
          echo "No deploy command configured."
          echo "Edit .github/workflows/deploy.yml and uncomment one of the"
          echo "deploy options above, or add your own."
          echo ""
          echo "Image ready at: ${{ needs.build.outputs.image }}"
