name: Deploy

on:
  # Automatic: push to main deploys to int
  push:
    branches: [main]

  # Manual: choose target environment
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [int, uat, prod]

jobs:
  # ── Step 1: run tests before any deploy ────────────────────────────────────
  test:
    name: Test (Python 3.11)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: antcrew_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        env:
          TEST_DB_URL: postgresql+asyncpg://postgres:postgres@localhost/antcrew_ci
          LOG_FORMAT: text
          ANTCREW_SANDBOX: none
        run: pytest -v --tb=short

  # ── Step 2: build and push image to GHCR ───────────────────────────────────
  build:
    name: Build image (${{ (github.event_name == 'push' && 'int') || github.event.inputs.environment }})
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      env_name: ${{ steps.resolve-env.outputs.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve target environment
        id: resolve-env
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "name=int" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=${{ steps.resolve-env.outputs.name }}-,format=short
            type=raw,value=${{ steps.resolve-env.outputs.name }}-latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            APP_ENV=${{ steps.resolve-env.outputs.name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Step 3: gate — verify UAT passed before allowing prod ──────────────────
  # Queries the GitHub Deployments API for the 'uat' environment.
  # GitHub Actions automatically records a deployment + status for each job
  # that uses `environment:`, so this reflects real deploy outcomes.
  gate-prod:
    name: Gate — verify UAT deployed successfully
    needs: build
    if: needs.build.outputs.env_name == 'prod'
    runs-on: ubuntu-latest
    permissions:
      deployments: read
    steps:
      - name: Check latest UAT deployment is successful
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEPLOYMENT_ID=$(gh api \
            "repos/${{ github.repository }}/deployments?environment=uat&per_page=1" \
            --jq '.[0].id')

          if [ -z "$DEPLOYMENT_ID" ] || [ "$DEPLOYMENT_ID" = "null" ]; then
            echo "::error::No UAT deployment found. Deploy to UAT first before promoting to prod."
            exit 1
          fi

          STATUS=$(gh api \
            "repos/${{ github.repository }}/deployments/$DEPLOYMENT_ID/statuses?per_page=1" \
            --jq '.[0].state')

          echo "Latest UAT deployment ID: $DEPLOYMENT_ID, status: $STATUS"

          if [ "$STATUS" != "success" ]; then
            echo "::error::Latest UAT deployment is not successful (status: $STATUS). Promote UAT first."
            exit 1
          fi

          echo "UAT gate passed — latest UAT deployment is successful."

  # ── Step 4: deploy ──────────────────────────────────────────────────────────
  # prod requires:
  #   a) gate-prod to pass (UAT was deployed successfully)
  #   b) manual approval in the 'prod' GitHub Environment
  #      (configure under Settings → Environments → prod → Required reviewers)
  deploy:
    name: Deploy to ${{ needs.build.outputs.env_name }}
    needs: [build, gate-prod]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.gate-prod.result == 'success' || needs.gate-prod.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ needs.build.outputs.env_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --config fly.${{ needs.build.outputs.env_name }}.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
