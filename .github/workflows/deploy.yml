name: Deploy

on:
  # Automatic: push to main deploys to int
  push:
    branches: [main]

  # Manual: choose target environment
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [int, uat, prod]

jobs:
  # ── Step 1: run tests before any deploy ────────────────────────────────────
  test:
    name: Test (Python 3.11)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: antcrew_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        env:
          TEST_DB_URL: postgresql+asyncpg://postgres:postgres@localhost/antcrew_ci
          LOG_FORMAT: text
          ANTCREW_SANDBOX: none
        run: pytest -v --tb=short

  # ── Step 2: build and push image to GHCR ───────────────────────────────────
  build:
    name: Build image (${{ (github.event_name == 'push' && 'int') || github.event.inputs.environment }})
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      env_name: ${{ steps.resolve-env.outputs.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve target environment
        id: resolve-env
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "name=int" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=${{ steps.resolve-env.outputs.name }}-,format=short
            type=raw,value=${{ steps.resolve-env.outputs.name }}-latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            APP_ENV=${{ steps.resolve-env.outputs.name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Step 3: deploy ─────────────────────────────────────────────────────────
  # The "prod" GitHub Environment requires a manual approval — configure this
  # under Settings → Environments → prod → Required reviewers.
  deploy:
    name: Deploy to ${{ needs.build.outputs.env_name }}
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ needs.build.outputs.env_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --app antcrew-${{ needs.build.outputs.env_name }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
